<svg viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe6f3"/><stop offset=".38" stop-color="#93b9d8"/>
      <stop offset=".52" stop-color="#7aa386"/><stop offset="1" stop-color="#2e4a2b"/>
    </linearGradient>
    <radialGradient id="hole" cx="50%" cy="58%" r="40%">
      <stop offset="0" stop-color="#33502f"/><stop offset=".55" stop-color="#4d7040"/>
      <stop offset="1" stop-color="#6f9a6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f0f6"/><stop offset=".55" stop-color="#aebcc7"/><stop offset="1" stop-color="#5a7180"/>
    </linearGradient>
    <linearGradient id="suitN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d2dee8"/><stop offset="1" stop-color="#465c6b"/>
    </linearGradient>
    <radialGradient id="helm" cx="38%" cy="28%" r="85%">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".55" stop-color="#c4d2db"/><stop offset="1" stop-color="#6f8390"/>
    </radialGradient>
    <linearGradient id="vis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173241"/><stop offset="1" stop-color="#0a1b24"/>
    </linearGradient>
    <!-- One boxman, belly-to-earth, facing viewer. Origin = chest center. h~96 -->
    <g id="boxman">
      <!-- legs: thigh out, shin bent up (booties up behind) -->
      <path d="M-12,26 L-30,40 L-26,18" fill="none" stroke="url(#suitN)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12,26 L30,40 L26,18" fill="none" stroke="url(#suitN)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- arms: upper arm down-out, forearm forward to grippers (boxman 90deg) -->
      <path d="M-20,-12 L-42,2 L-40,22" fill="none" stroke="url(#suit)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20,-12 L42,2 L40,22" fill="none" stroke="url(#suit)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- grippers (hands) -->
      <circle cx="-40" cy="24" r="5.5" fill="#cdd9e2"/><circle cx="40" cy="24" r="5.5" fill="#cdd9e2"/>
      <!-- torso (jumpsuit), broad shoulders -> tapered -->
      <path d="M-22,-16 Q0,-22 22,-16 L17,26 Q0,32 -17,26 Z" fill="url(#suit)"/>
      <!-- chest zip / centerline -->
      <path d="M0,-16 L0,26" stroke="#8a9aa6" stroke-width="1.4" opacity=".6"/>
      <!-- helmet + visor (toward viewer) -->
      <circle cx="0" cy="-26" r="13" fill="url(#helm)"/>
      <path d="M-10,-25 a10 8 0 0 0 20 0 Z" fill="url(#vis)"/>
    </g>
  </defs>

  <!-- sky -> earth -->
  
  
  <!-- faint patchwork fields seen through the ring -->
  

  <!-- TEAMMATES around the ring (far = hazier/smaller, sides = closer) -->
  <!-- opposite (far, top center) -->
  <g transform="translate(240,96) scale(.82)" opacity=".92"><use href="#boxman"/></g>
  <!-- left (near) -->
  <g transform="translate(112,160) scale(1.06) rotate(54)"><use href="#boxman"/></g>
  <!-- right (near) -->
  <g transform="translate(368,160) scale(1.06) rotate(-54)"><use href="#boxman"/></g>
  <!-- atmospheric haze over the far figure -->
  

  <!-- VIEWER's own forearms + grippers reaching into the ring (POV signature) -->
  <path d="M22,270 L92,252 L156,214" fill="none" stroke="url(#suit)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M458,270 L388,252 L324,214" fill="none" stroke="url(#suit)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="156" cy="214" r="10" fill="#e8f0f6"/><circle cx="324" cy="214" r="10" fill="#e8f0f6"/>
  <!-- grip link glow at the wrists -->
  <circle cx="156" cy="214" r="15" fill="none" stroke="#22d3ee" stroke-width="2" opacity=".35"/>
  <circle cx="324" cy="214" r="15" fill="none" stroke="#22d3ee" stroke-width="2" opacity=".35"/>

  
</svg>

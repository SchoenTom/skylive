<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520" role="img" aria-label="Closing 4 km of sky: from +30 dBm transmit, minus 119.8 dB free-space loss and 5 dB cable plus polarisation, to about +8 dB belly margin at a favourable heading against a conservative −90 dBm threshold; the dipole floors the worst heading at about +2 dB, and head-down rides the threshold. Recalculated 2026-06 for the v5 side-patch geometry. The signal strengthens as the jumper descends toward the ground station.">
<defs>
  <linearGradient id="air" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a1430"/><stop offset=".5" stop-color="#163a5e"/><stop offset=".8" stop-color="#1d6b6f"/><stop offset="1" stop-color="#2f5d36"/></linearGradient>
  <linearGradient id="bgg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22d3ee" stop-opacity=".15"/><stop offset="1" stop-color="#22d3ee" stop-opacity=".7"/></linearGradient>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
    .sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    /* jumper falls 4 km → ground; gravity-ish ease-in */
    @keyframes fall{0%{transform:translateY(0);opacity:0}6%{opacity:1}90%{opacity:1}100%{transform:translateY(338px);opacity:0}}
    /* signal strength grows in LOCKSTEP with the fall (same timing) — already closed at 4 km, only climbs */
    @keyframes strength{0%{width:96px}90%{width:150px}100%{width:150px}}
    @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    #jumper{animation:fall 5s ease-in infinite}
    #mbar{animation:strength 5s ease-in infinite}
    #gs{animation:pulse 1.6s ease-in-out infinite}
  </style>
</defs>
<rect width="920" height="520" fill="url(#bgg)"/>
<text x="48" y="52" class="mono" font-size="15" letter-spacing="3" fill="#7186a0">CLOSING 4 KM OF SKY</text>

<!-- altitude column -->
<rect x="60" y="80" width="150" height="392" rx="12" fill="url(#air)" stroke="rgba(255,255,255,.1)"/>
<g class="mono" font-size="11" fill="rgba(255,255,255,.6)">
  <text x="220" y="96">4000 m</text><line x1="60" y1="92" x2="210" y2="92" stroke="rgba(255,255,255,.15)"/>
  <text x="220" y="190">3000</text><line x1="60" y1="186" x2="210" y2="186" stroke="rgba(255,255,255,.1)"/>
  <text x="220" y="284">2000</text><line x1="60" y1="280" x2="210" y2="280" stroke="rgba(255,255,255,.1)"/>
  <text x="220" y="378">1000</text><line x1="60" y1="374" x2="210" y2="374" stroke="rgba(255,255,255,.1)"/>
  <text x="220" y="470">0 m · DZ</text>
</g>
<!-- persistent link beam: jumper → ground station, always connected -->
<rect x="132" y="112" width="6" height="338" rx="3" fill="url(#beam)"/>
<!-- ground station (pulses) -->
<g id="gs"><path d="M120 452 a15 15 0 0 1 30 0" fill="none" stroke="#67e8f9" stroke-width="2.5"/><path d="M112 452 a23 23 0 0 1 46 0" fill="none" stroke="#67e8f9" stroke-width="2" opacity=".5"/><circle cx="135" cy="452" r="5" fill="#67e8f9"/></g>
<text x="135" y="490" text-anchor="middle" class="mono" font-size="10" fill="#67e8f9">GROUND RX</text>
<!-- jumper: descends the whole 4 km, link held all the way -->
<g id="jumper">
  <circle cx="135" cy="112" r="11" fill="#22d3ee" opacity=".25"/>
  <circle cx="135" cy="112" r="6" fill="#eaf6fb"/>
  <text x="135" y="98" text-anchor="middle" class="mono" font-size="10" fill="#cfe0ec">JUMPER · LIVE</text>
</g>

<!-- ledger (honest, from ENGINEERING.md) -->
<text x="430" y="104" class="sans" font-size="26" font-weight="800" fill="#f4f7fb">The link, honestly closed.</text>
<g class="mono" font-size="14.5">
  <text x="430" y="146" fill="#aebdce">Transmit power</text><text x="872" y="146" text-anchor="end" fill="#67e8f9">+30 dBm · 1 W</text>
  <text x="430" y="176" fill="#aebdce">Antenna gain (RX +13 · TX by angle)</text><text x="872" y="176" text-anchor="end" fill="#67e8f9">up to +18 dB</text>
  <text x="430" y="206" fill="#aebdce">Free-space loss @ 4 km</text><text x="872" y="206" text-anchor="end" fill="#ef8a7f">− 119.8 dB</text>
  <text x="430" y="236" fill="#aebdce">Cable + polarisation</text><text x="872" y="236" text-anchor="end" fill="#ef8a7f">− 5 dB</text>
  <text x="430" y="266" fill="#aebdce">Image threshold (conservative)</text><text x="872" y="266" text-anchor="end" fill="#67e8f9">− 90 dBm</text>
  <line x1="430" y1="286" x2="872" y2="286" stroke="rgba(255,255,255,.18)"/>
</g>
<text x="430" y="324" class="sans" font-size="20" font-weight="800" fill="#f4f7fb">Margin <tspan fill="#22d3ee">≈ +8 dB</tspan> <tspan class="mono" font-size="13" font-weight="400" fill="#7186a0">belly @ 4 km · favourable heading</tspan></text>
<rect x="430" y="338" width="206" height="14" rx="7" fill="rgba(255,255,255,.1)"/>
<rect id="mbar" x="430" y="338" width="150" height="14" rx="7" fill="#22d3ee"/>
<text x="650" y="350" class="mono" font-size="13" fill="#9fc4e2">stronger as he falls</text>
<!-- honest head-down note (the real 'never lose the image' story) -->
<g class="mono" font-size="13" fill="#7186a0">
  <text x="430" y="384">Side patch → belly margin depends on heading.</text>
  <text x="430" y="406">Worst heading <tspan fill="#9fe8b0">≈ +2 dB</tspan> — <tspan fill="#cfe0ec">the dipole takes over</tspan>.</text>
  <text x="430" y="428">Head-down rides the threshold (<tspan fill="#edab28">≈ −2 dB calc</tspan>).</text>
  <text x="430" y="450" fill="#5a6b82">Re-run 2026-06 for the v5 side-patch — ENGINEERING.md.</text>
  <text x="430" y="470" fill="#5a6b82">Next gate: turntable pattern @ 25 mW.</text>
</g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 980" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <!-- SkyLive dimensional drawing · scale 4 px = 1 mm · all numbers from the executed CAD -->
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#7dd3fc" stroke-width="1.6"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16324a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1640" height="980" fill="#0b1f33"/>
  <rect width="1640" height="980" fill="url(#grid)"/>

  <text x="60" y="66" fill="#e2f3ff" font-size="30" font-weight="bold">SKYLIVE — DIMENSIONAL SHEET</text>
  <text x="60" y="96" fill="#7dd3fc" font-size="15">scale 4 px = 1 mm · grid = 10 mm · every number measured from the executed CAD (not a sketch)</text>

  <!-- ══════════ SENDER 850 · FRONT (Y×Z: 39.5 × 56) ══════════ -->
  <g transform="translate(120,180)">
    <text x="79" y="-24" fill="#e2f3ff" font-size="16" text-anchor="middle">SENDER 850 · front</text>
    <rect x="0" y="0" width="158" height="224" rx="22" fill="none" stroke="#e2f3ff" stroke-width="2.5"/>
    <!-- T-slot top center -->
    <rect x="73.2" y="0" width="11.6" height="22" fill="none" stroke="#f0a6e8" stroke-width="1.6"/>
    <text x="96" y="16" fill="#f0a6e8" font-size="12">2.9 press-fit slot</text>
    <!-- GoPro fork below -->
    <g stroke="#e2f3ff" stroke-width="2" fill="none">
      <rect x="60.4" y="224" width="12" height="58"/>
      <rect x="85.6" y="224" width="12" height="58"/>
    </g>
    <!-- width dim 39.5 -->
    <g stroke="#7dd3fc" stroke-width="1.4" fill="none">
      <line x1="0" y1="-46" x2="0" y2="-8"/><line x1="158" y1="-46" x2="158" y2="-8"/>
      <line x1="0" y1="-40" x2="158" y2="-40" marker-start="url(#a1)" marker-end="url(#a1)"/>
    </g>
    <text x="79" y="-48" fill="#7dd3fc" font-size="15" text-anchor="middle">39.5</text>
    <!-- height dim 56 -->
    <g stroke="#7dd3fc" stroke-width="1.4" fill="none">
      <line x1="-46" y1="0" x2="-8" y2="0"/><line x1="-46" y1="224" x2="-8" y2="224"/>
      <line x1="-40" y1="0" x2="-40" y2="224" marker-start="url(#a1)" marker-end="url(#a1)"/>
    </g>
    <text x="-52" y="118" fill="#7dd3fc" font-size="15" text-anchor="end">56.0</text>
    <!-- teeth dims -->
    <g stroke="#7dd3fc" stroke-width="1.2" fill="none">
      <line x1="60.4" y1="292" x2="60.4" y2="304"/><line x1="72.4" y1="292" x2="72.4" y2="304"/>
      <line x1="85.6" y1="292" x2="85.6" y2="304"/>
    </g>
    <text x="66" y="320" fill="#7dd3fc" font-size="12" text-anchor="middle">3.0</text>
    <text x="79" y="336" fill="#7dd3fc" font-size="12" text-anchor="middle">gap 3.3 (GoPro)</text>
  </g>

  <!-- ══════════ SENDER 850 · SIDE (X×Z: 71 × 56) ══════════ -->
  <g transform="translate(420,180)">
    <text x="142" y="-24" fill="#e2f3ff" font-size="16" text-anchor="middle">SENDER 850 · side</text>
    <rect x="0" y="0" width="284" height="224" rx="22" fill="none" stroke="#e2f3ff" stroke-width="2.5"/>
    <!-- roof lid line -->
    <line x1="24" y1="12" x2="260" y2="12" stroke="#f5c56b" stroke-width="2"/>
    <text x="270" y="17" fill="#f5c56b" font-size="12">roof lid · 3× M3</text>
    <!-- storey split: shelf at Z = -4..-1 from center → y = 112+? shelf top = interior floor+bay+…; bay top at Z 0 → y=112 -->
    <line x1="3" y1="112" x2="281" y2="112" stroke="#5b7f9c" stroke-width="1.6" stroke-dasharray="7 5"/>
    <text x="8" y="105" fill="#5b7f9c" font-size="12">electronics storey (VTX + cam)</text>
    <text x="8" y="130" fill="#5b7f9c" font-size="12">battery storey (3S 850)</text>
    <!-- battery door on right face -->
    <rect x="274" y="118" width="10" height="96" fill="none" stroke="#9fd3ff" stroke-width="1.8"/>
    <text x="292" y="170" fill="#9fd3ff" font-size="12">door 31.5 × 24</text>
    <!-- length dim 71 -->
    <g stroke="#7dd3fc" stroke-width="1.4" fill="none">
      <line x1="0" y1="-46" x2="0" y2="-8"/><line x1="284" y1="-46" x2="284" y2="-8"/>
      <line x1="0" y1="-40" x2="284" y2="-40" marker-start="url(#a1)" marker-end="url(#a1)"/>
    </g>
    <text x="142" y="-48" fill="#7dd3fc" font-size="15" text-anchor="middle">71.0</text>
    <!-- wall callout -->
    <text x="8" y="216" fill="#8fe3a8" font-size="12">wall 3.0 — everywhere, sacrosanct</text>
  </g>

  <!-- ══════════ MINI 300 · FRONT (39.5 × 48) ══════════ -->
  <g transform="translate(880,212)">
    <text x="79" y="-24" fill="#e2f3ff" font-size="16" text-anchor="middle">MINI 300 · front</text>
    <rect x="0" y="0" width="158" height="192" rx="22" fill="none" stroke="#e2f3ff" stroke-width="2.5"/>
    <rect x="73.2" y="0" width="11.6" height="22" fill="none" stroke="#f0a6e8" stroke-width="1.6"/>
    <g stroke="#e2f3ff" stroke-width="2" fill="none">
      <rect x="60.4" y="192" width="12" height="58"/>
      <rect x="85.6" y="192" width="12" height="58"/>
    </g>
    <g stroke="#7dd3fc" stroke-width="1.4" fill="none">
      <line x1="0" y1="-46" x2="0" y2="-8"/><line x1="158" y1="-46" x2="158" y2="-8"/>
      <line x1="0" y1="-40" x2="158" y2="-40" marker-start="url(#a1)" marker-end="url(#a1)"/>
    </g>
    <text x="79" y="-48" fill="#7dd3fc" font-size="15" text-anchor="middle">39.5 (same — the radio sets it, not the battery)</text>
    <g stroke="#7dd3fc" stroke-width="1.4" fill="none">
      <line x1="-46" y1="0" x2="-8" y2="0"/><line x1="-46" y1="192" x2="-8" y2="192"/>
      <line x1="-40" y1="0" x2="-40" y2="192" marker-start="url(#a1)" marker-end="url(#a1)"/>
    </g>
    <text x="-52" y="102" fill="#7dd3fc" font-size="15" text-anchor="end">48.0</text>
  </g>

  <!-- ══════════ MINI 300 · SIDE (59.5 × 48) ══════════ -->
  <g transform="translate(1180,212)">
    <text x="119" y="-24" fill="#e2f3ff" font-size="16" text-anchor="middle">MINI 300 · side</text>
    <rect x="0" y="0" width="238" height="192" rx="22" fill="none" stroke="#e2f3ff" stroke-width="2.5"/>
    <line x1="20" y1="12" x2="218" y2="12" stroke="#f5c56b" stroke-width="2"/>
    <line x1="3" y1="112" x2="235" y2="112" stroke="#5b7f9c" stroke-width="1.6" stroke-dasharray="7 5"/>
    <text x="8" y="105" fill="#5b7f9c" font-size="12">same electronics storey</text>
    <text x="8" y="130" fill="#5b7f9c" font-size="12">battery storey (3S 300)</text>
    <g stroke="#7dd3fc" stroke-width="1.4" fill="none">
      <line x1="0" y1="-46" x2="0" y2="-8"/><line x1="238" y1="-46" x2="238" y2="-8"/>
      <line x1="0" y1="-40" x2="238" y2="-40" marker-start="url(#a1)" marker-end="url(#a1)"/>
    </g>
    <text x="119" y="-48" fill="#7dd3fc" font-size="15" text-anchor="middle">59.5</text>
    <text x="8" y="216" fill="#8fe3a8" font-size="12">−28 % volume vs the 850</text>
  </g>

  <!-- ══════════ SCALE BAR ══════════ -->
  <g transform="translate(120,880)">
    <text x="0" y="-14" fill="#e2f3ff" font-size="14">SCALE</text>
    <g stroke="#e2f3ff" stroke-width="2">
      <line x1="0" y1="0" x2="280" y2="0"/>
      <line x1="0" y1="-8" x2="0" y2="8"/><line x1="40" y1="-5" x2="40" y2="5"/>
      <line x1="80" y1="-8" x2="80" y2="8"/><line x1="120" y1="-5" x2="120" y2="5"/>
      <line x1="160" y1="-8" x2="160" y2="8"/><line x1="200" y1="-5" x2="200" y2="5"/>
      <line x1="240" y1="-8" x2="240" y2="8"/><line x1="280" y1="-8" x2="280" y2="8"/>
    </g>
    <g fill="#7dd3fc" font-size="13" text-anchor="middle">
      <text x="0" y="26">0</text><text x="80" y="26">20</text><text x="160" y="26">40</text>
      <text x="240" y="26">60</text><text x="280" y="26">70 mm</text>
    </g>
  </g>

  <!-- key numbers table -->
  <g transform="translate(560,830)" fill="#e2f3ff" font-size="14">
    <text y="0" fill="#7dd3fc">THE NUMBERS THAT MATTER</text>
    <text y="26">antenna clamp slot 2.9 on Ø3.1 coax (−0.2 grip) · GoPro teeth 3.0 / gap 3.3 · door opening 31.5×24 (850) · 19×16 (Mini)</text>
    <text y="50">inserts: M3 Ø5×6 → bore Ø4.6×8 · M2 Ø3.2×3 → bore Ø2.8×5 · battery (measured): 58×30×22 (850) · 45×17.5×15.3 (Mini)</text>
    <text y="74" fill="#8fe3a8">all cap screws DIN 912 · PETG/ASA only · full derivations in build/</text>
  </g>
</svg>

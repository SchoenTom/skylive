<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" width="840" height="340" role="img" aria-label="Passive thermal with an operating doctrine: 25 mW on the ground, 1 W only at door-open — in freefall the ram-air carries the roughly 13 watts of heat; switch off within 60 seconds after landing.">
<defs>
  <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    @keyframes drift{0%,100%{opacity:.35}50%{opacity:1}}
    .ram{animation:drift 1.6s ease-in-out infinite}
  </style>
</defs>
<rect width="840" height="340" fill="url(#cbg)"/>
<text x="40" y="46" class="mono" font-size="15" letter-spacing="3" fill="#7186a0">PASSIVE THERMAL · RAM-AIR COOLED</text>

<!-- plot area -->
<rect x="60" y="74" width="720" height="170" rx="10" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.08)"/>
<!-- bands: safe ceiling + steady -->
<line x1="60" y1="110" x2="780" y2="110" stroke="#ef8a7f" stroke-dasharray="5 6" opacity=".6"/>
<text x="72" y="104" class="mono" font-size="11" fill="#ef8a7f">▲ over-temp → the VTX cuts RF hard</text>
<line x1="60" y1="150" x2="780" y2="150" stroke="#67e8f9" stroke-dasharray="5 6" opacity=".6"/>
<text x="72" y="166" class="mono" font-size="11" fill="#67e8f9">doctrine: leave the plane cool — 1 W only at door-open</text>
<!-- temp curve: heat builds on the ground, ram-air pulls it down through the jump -->
<polyline points="80,196 180,150 300,118 360,124 470,170 560,158 660,176 760,182"
  fill="none" stroke="#edab28" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
<!-- freefall ram-air band (the whole airborne phase cools for free) -->
<rect x="360" y="74" width="280" height="170" fill="rgba(34,211,238,.06)"/>
<g class="ram" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" opacity=".9">
  <path d="M392 96 v40 M386 128 l6 8 6 -8"/><path d="M448 96 v40 M442 128 l6 8 6 -8"/>
  <path d="M520 96 v40 M514 128 l6 8 6 -8"/><path d="M592 96 v40 M586 128 l6 8 6 -8"/></g>
<text x="500" y="92" class="mono" font-size="10" fill="#67e8f9" text-anchor="middle">RAM-AIR CARRIES THE HEAT</text>
<!-- heat-spreader chip glyph (passive) near post-run -->
<g transform="translate(688,236)">
  <rect x="-22" y="-10" width="44" height="20" rx="3" fill="none" stroke="#3a4658" stroke-width="2"/>
  <g stroke="#9fc4e2" stroke-width="2" stroke-linecap="round" opacity=".85">
    <path d="M-14 -10 v-8 M-2 -10 v-8 M10 -10 v-8"/><path d="M-14 10 v8 M-2 10 v8 M10 10 v8"/></g>
  <text x="0" y="3" class="mono" font-size="7" fill="#67e8f9" text-anchor="middle">PAD→WALL</text>
</g>

<!-- phase labels -->
<g class="mono" font-size="11" fill="#9fc4e2" text-anchor="middle">
  <text x="110" y="266">Boarding</text><text x="220" y="266">Climb</text><text x="345" y="266">Exit</text>
  <text x="415" y="266">Freefall</text><text x="520" y="266">Canopy</text><text x="620" y="266">Landing</text><text x="720" y="266">Post-run</text>
</g>
<!-- passive bands -->
<rect x="60" y="278" width="300" height="20" rx="5" fill="rgba(159,196,226,.14)"/><text x="210" y="292" class="mono" font-size="11" fill="#9fc4e2" text-anchor="middle">25 mW on the ground · pad to the wall</text>
<rect x="360" y="278" width="280" height="20" rx="5" fill="rgba(34,211,238,.14)"/><text x="500" y="292" class="mono" font-size="10" fill="#67e8f9" text-anchor="middle">ram-air cools it for free</text>
<rect x="640" y="278" width="140" height="20" rx="5" fill="rgba(159,196,226,.14)"/><text x="710" y="292" class="mono" font-size="11" fill="#9fc4e2" text-anchor="middle">OFF within 60 s</text>

<text x="40" y="326" class="sans" font-size="16" fill="#aebdce"><tspan fill="#f4f7fb" font-weight="700">No fan, no moving parts.</tspan> 1 W makes ~13 W of heat — still air can't hold it, the 200 km/h fall can. <tspan fill="#22d3ee">Doctrine, not hardware.</tspan></text>
</svg>

<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkyDive·Live — 3D Diagnose</title>
<style>
  body{margin:0;font:15px/1.5 -apple-system,system-ui,sans-serif;background:#0a1410;color:#e8f0ec}
  .wrap{max-width:900px;margin:0 auto;padding:24px}
  h1{font-size:20px;margin:0 0 4px} .sub{color:#7da;margin:0 0 18px}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .card{flex:1;min-width:280px;background:#0f1d17;border:1px solid #1d3b2e;border-radius:12px;padding:14px;margin-bottom:14px}
  .k{color:#8fb;font-weight:600} .ok{color:#3ddc84} .bad{color:#ff6b6b;font-weight:700}
  canvas,model-viewer{width:100%;height:230px;background:#06100c;border-radius:8px;display:block}
  pre{white-space:pre-wrap;font:12px/1.45 ui-monospace,Menlo,monospace;color:#bcd;background:#08120e;padding:10px;border-radius:8px;margin:8px 0 0}
  .big{font-size:17px}
</style></head><body><div class="wrap">
<h1>SkyDive·Live — 3D Diagnose</h1>
<p class="sub">Bitte einfach öffnen, ~5 Sek warten, dann <b>kompletten Screenshot</b> schicken.</p>

<div class="card"><div class="k big">1) WebGL-Status (roh)</div><pre id="gl">prüfe…</pre></div>

<div class="row">
  <div class="card"><div class="k">2) Roher WebGL-Test (Dreieck = GPU ok)</div>
    <canvas id="cv"></canvas><pre id="cvs">…</pre></div>
  <div class="card"><div class="k">3) model-viewer Test</div>
    <model-viewer id="mv" src="sender_assembled.glb" camera-controls auto-rotate
      environment-image="neutral" exposure="1.1" loading="eager" reveal="auto"></model-viewer>
    <pre id="mvs">lade…</pre></div>
</div>
<div class="card"><div class="k">4) Umgebung</div><pre id="env">…</pre></div>

<script type="module" src="vendor/model-viewer.min.js"></script>
<script>
(function(){
  // 1) WebGL caps
  function info(){
    var out=[],c=document.createElement('canvas');
    var gl2=c.getContext('webgl2'), gl1=c.getContext('webgl')||c.getContext('experimental-webgl');
    out.push('WebGL2: '+(gl2?'JA':'NEIN'));
    out.push('WebGL1: '+(gl1?'JA':'NEIN'));
    var gl=gl2||gl1;
    if(gl){
      var dbg=gl.getExtension('WEBGL_debug_renderer_info');
      if(dbg){ out.push('GPU: '+gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL)); out.push('Vendor: '+gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)); }
      out.push('MaxTexture: '+gl.getParameter(gl.MAX_TEXTURE_SIZE));
    } else { out.push('>>> KEIN WebGL-Kontext erstellbar! <<<'); }
    document.getElementById('gl').textContent=out.join('\n');
    document.getElementById('gl').className = gl ? '' : 'bad';
  }
  // 2) raw triangle
  function tri(){
    var cv=document.getElementById('cv'), s=document.getElementById('cvs');
    var gl=cv.getContext('webgl');
    if(!gl){ s.textContent='FEHLER: kein WebGL-Kontext'; s.className='bad'; return; }
    cv.width=cv.clientWidth; cv.height=cv.clientHeight;
    var vs=gl.createShader(gl.VERTEX_SHADER);gl.shaderSource(vs,'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}');gl.compileShader(vs);
    var fs=gl.createShader(gl.FRAGMENT_SHADER);gl.shaderSource(fs,'precision mediump float;void main(){gl_FragColor=vec4(0.24,0.86,0.52,1.);}');gl.compileShader(fs);
    var pr=gl.createProgram();gl.attachShader(pr,vs);gl.attachShader(pr,fs);gl.linkProgram(pr);gl.useProgram(pr);
    var b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([0,.8,-.8,-.7,.8,-.7]),gl.STATIC_DRAW);
    var l=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
    gl.clearColor(.03,.07,.05,1);gl.clear(gl.COLOR_BUFFER_BIT);gl.drawArrays(gl.TRIANGLES,0,3);
    var err=gl.getError();
    cv.addEventListener('webglcontextlost',function(){s.textContent='>>> CONTEXT LOST! <<<';s.className='bad';});
    s.textContent='Dreieck gezeichnet, glError='+err+(err===0?' (ok)':' (FEHLER)'); s.className=err===0?'ok':'bad';
  }
  // 3) model-viewer
  function mv(){
    var m=document.getElementById('mv'), s=document.getElementById('mvs');
    m.addEventListener('load',function(){ setTimeout(function(){ s.textContent='loaded=true · modelIsVisible='+m.modelIsVisible+(m.modelIsVisible?' (SICHTBAR ok)':' (NICHT sichtbar!)'); s.className=m.modelIsVisible?'ok':'bad'; },1500); });
    m.addEventListener('error',function(e){ s.textContent='ERROR: '+JSON.stringify(e.detail); s.className='bad'; });
    setTimeout(function(){ if(!m.loaded) s.textContent='Timeout: loaded='+m.loaded+' visible='+m.modelIsVisible; },6000);
  }
  function envi(){
    document.getElementById('env').textContent='UA: '+navigator.userAgent+'\nProtokoll: '+location.protocol+'\nHardwareConcurrency: '+navigator.hardwareConcurrency+'\ndevicePixelRatio: '+window.devicePixelRatio;
  }
  window.addEventListener('load',function(){ info();tri();mv();envi(); });
})();
</script>
</div></body></html>

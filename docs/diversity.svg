<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360" role="img" aria-label="The ground station listens through multiple fixed helix beams — one aimed at the zenith, three fanned toward the horizon. The receiver fuses the branches and rides the strongest one.">
<defs>
  <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1422"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <radialGradient id="lobe" cx="50%" cy="85%" r="70%"><stop offset="0" stop-color="rgba(34,211,238,.26)"/><stop offset="1" stop-color="transparent"/></radialGradient>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    @keyframes bz{0%,30%{opacity:1}38%,92%{opacity:.35}100%{opacity:1}}
    @keyframes bl{0%,30%{opacity:.35}38%,60%{opacity:1}68%,100%{opacity:.35}}
    @keyframes br{0%,60%{opacity:.35}68%,92%{opacity:1}100%{opacity:.35}}
    @keyframes win{0%,30%{transform:translateX(0)}38%,60%{transform:translateX(-64px)}68%,92%{transform:translateX(64px)}100%{transform:translateX(0)}}
    #beamZ{animation:bz 6s ease-in-out infinite}
    #beamL{animation:bl 6s ease-in-out infinite}
    #beamR{animation:br 6s ease-in-out infinite}
    #winner{animation:win 6s ease-in-out infinite}
  </style>
</defs>
<rect width="680" height="360" fill="url(#dbg)"/>
<text x="40" y="42" class="mono" font-size="15" letter-spacing="3" fill="#7186a0">MULTIPLE FIXED BEAMS</text>
<text x="40" y="62" class="mono" font-size="11" letter-spacing="1.5" fill="#67e8f9">self-printed helix antennas · receiver fuses the branches</text>

<!-- jumper up top -->
<circle cx="340" cy="96" r="7" fill="#dfe9f2"/><text x="340" y="82" class="mono" font-size="11" fill="#cfe0ec" text-anchor="middle">JUMPER · 4 km up</text>

<!-- zenith beam: straight up at the jumper -->
<g id="beamZ">
  <ellipse cx="340" cy="196" rx="42" ry="96" fill="url(#lobe)"/>
  <ellipse cx="340" cy="196" rx="42" ry="96" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity=".55"/>
  <text x="340" y="150" class="mono" font-size="10" fill="#67e8f9" text-anchor="middle">ZENITH</text>
</g>
<!-- azimuth beams: fanned toward the horizon (third one points out of the plane) -->
<g id="beamL" transform="rotate(-58 340 292)">
  <ellipse cx="340" cy="200" rx="34" ry="86" fill="url(#lobe)"/>
  <ellipse cx="340" cy="200" rx="34" ry="86" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity=".45"/>
</g>
<g id="beamR" transform="rotate(58 340 292)">
  <ellipse cx="340" cy="200" rx="34" ry="86" fill="url(#lobe)"/>
  <ellipse cx="340" cy="200" rx="34" ry="86" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity=".45"/>
</g>
<circle cx="340" cy="268" r="16" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4 4" opacity=".45"/>
<text x="362" y="264" class="mono" font-size="9.5" fill="#7186a0">3rd azimuth beam · out of the page</text>
<text x="452" y="308" class="mono" font-size="10" fill="#9fc4e2">AZIMUTH · ~55° each</text>
<text x="140" y="308" class="mono" font-size="10" fill="#9fc4e2" text-anchor="end">AZIMUTH</text>

<!-- ground + station mast with four helix heads -->
<line x1="40" y1="318" x2="640" y2="318" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
<line x1="340" y1="318" x2="340" y2="284" stroke="#5a6e7c" stroke-width="4"/>
<!-- four helix heads on the mast: zenith up, two fanned, one toward the viewer -->
<g fill="#67e8f9">
  <circle cx="340" cy="282" r="4"/>
  <circle cx="326" cy="290" r="3.4" opacity=".85"/>
  <circle cx="354" cy="290" r="3.4" opacity=".85"/>
  <circle cx="340" cy="296" r="3" opacity=".7"/>
</g>
<g stroke="#9fc4e2" stroke-width="1.6" fill="none" opacity=".8">
  <line x1="340" y1="278" x2="340" y2="268"/>
  <line x1="323" y1="287" x2="315" y2="281"/>
  <line x1="357" y1="287" x2="365" y2="281"/>
</g>

<!-- 'receiver fuses the branches' selector -->
<g id="winner"><rect x="316" y="336" width="48" height="3" rx="1.5" fill="#22d3ee"/></g>
<text x="340" y="332" class="mono" font-size="10" fill="#67e8f9" text-anchor="middle">strongest branch wins</text>

<text x="40" y="338" class="sans" font-size="12.5" fill="#aebdce">One beam at the <tspan fill="#67e8f9">zenith</tspan>, three fanned to the <tspan fill="#22d3ee">horizon</tspan> — no tracker, no combiner. <tspan fill="#f4f7fb" font-weight="700">The receiver rides the strongest branch.</tspan></text>
<text x="40" y="354" class="sans" font-size="12.5" fill="#7186a0">4 branches on the receiver today (stock stubs off) — scales to 7 on the self-built station. Measurement first: one prototype decides.</text>
</svg>
